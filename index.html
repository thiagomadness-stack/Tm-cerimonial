<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Cerimonial – Gestão de Eventos</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --sidebar: #1a1a2e;
    --sidebar-text: #ccc;
    --sidebar-active: #c9a84c;
    --accent: #c9a84c;
    --accent2: #7b5e2a;
    --text: #2d2d2d;
    --muted: #888;
    --border: #ddd;
    --danger: #e05555;
    --success: #4caf7d;
    --warning: #f0a500;
    --info: #4a90d9;
    --cat-bg: #f0ebe0;
    --row-alt: #fafaf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 240px; min-width: 240px; background: var(--sidebar); color: var(--sidebar-text);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  #sidebar-logo {
    padding: 24px 20px 16px; border-bottom: 1px solid #333;
    font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; line-height: 1.3;
  }
  #sidebar-logo span { display: block; font-size: 11px; color: #888; font-weight: 400; margin-top: 2px; }
  #sidebar-menu { padding: 12px 0; flex: 1; }
  .menu-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; padding: 10px 20px 4px; }
  .menu-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer;
    font-size: 13.5px; border-left: 3px solid transparent; transition: all 0.15s;
  }
  .menu-item:hover { background: #252540; color: #fff; }
  .menu-item.active { background: #252540; color: var(--accent); border-left-color: var(--accent); }
  .menu-item .icon { width: 18px; text-align: center; font-size: 15px; }
  #event-list { padding: 0 0 12px; }
  .event-chip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; cursor: pointer; font-size: 12.5px; color: #aaa;
    transition: background 0.12s; gap: 6px;
  }
  .event-chip:hover { background: #252540; color: #fff; }
  .event-chip.active { color: var(--accent); background: #1e1e35; }
  .event-chip .chip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: normal; line-height: 1.3; }
  .event-chip .chip-type {
    font-size: 10px; background: #333; padding: 2px 6px; border-radius: 10px; white-space: nowrap;
  }
  .event-chip.active .chip-type { background: #3a3020; color: var(--accent); }
  #sidebar-footer { padding: 14px 20px; border-top: 1px solid #333; font-size: 11px; color: #555; }
  #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  #menu-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 0 4px; }

  @media (max-width: 768px) {
    #menu-toggle { display: block; }
    #sidebar {
      position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100;
      width: 260px; min-width: 260px;
      transition: left 0.25s ease;
    }
    #sidebar.open { left: 0; }
    #sidebar-overlay.open { display: block; }
    #topbar { padding: 0 14px; gap: 8px; }
    #topbar-title { font-size: 15px; }
    #content { padding: 10px !important; }
    .fin-cards { gap: 8px !important; }
    .fin-card { min-width: 120px !important; padding: 12px !important; }
    .org-table { font-size: 12px; }
    .org-table td, .org-table th { padding: 5px 6px !important; }
    .add-item-row input { width: 160px !important; }
    .dashboard-grid { grid-template-columns: 1fr !important; }
  }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-shrink: 0;
  }
  #topbar-title { font-size: 17px; font-weight: 600; color: var(--text); }
  #topbar-actions { display: flex; gap: 8px; }
  #content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c44; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px 8px; border-radius: 5px; }

  /* DASHBOARD */
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .event-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .event-card:hover { border-color: var(--accent); box-shadow: 0 3px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .event-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .event-card.tipo-casamento::before { background: #e88fa0; }
  .event-card.tipo-15anos::before { background: #a888e8; }
  .event-card.tipo-formatura::before { background: #5cb85c; }
  .card-tipo { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .card-nome { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .card-data { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  .card-stats { display: flex; gap: 16px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10.5px; color: var(--muted); }
  .stat-value { font-size: 14px; font-weight: 600; }
  .stat-value.money { color: var(--accent2); }
  .card-status-badge {
    position: absolute; top: 14px; right: 14px; font-size: 10px; padding: 3px 8px;
    border-radius: 10px; font-weight: 600; text-transform: uppercase;
  }
  .badge-orcando { background: #fff3cd; color: #856404; }
  .badge-orcado { background: #d1ecf1; color: #0c5460; }
  .badge-contrato { background: #d4edda; color: #155724; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* FORM MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--surface); border-radius: 12px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
  }
  .modal-body { overflow-y: auto; }
  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12.5px; font-weight: 500; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 13.5px; color: var(--text); background: var(--surface); transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tipo-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .tipo-card {
    border: 2px solid var(--border); border-radius: 8px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.15s;
  }
  .tipo-card:hover { border-color: var(--accent); }
  .tipo-card.selected { border-color: var(--accent); background: #fdf8ee; }
  .tipo-card .tipo-icon { font-size: 24px; margin-bottom: 6px; }
  .tipo-card .tipo-name { font-size: 12.5px; font-weight: 500; }

  /* EVENT DETAIL */
  .event-header {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 20px;
  }
  .event-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  .event-header-info h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .event-header-info .tipo-tag {
    display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .tipo-tag.casamento { background: #fce4ec; color: #c2185b; }
  .tipo-tag.anos15 { background: #ede7f6; color: #6a1b9a; }
  .tipo-tag.formatura { background: #e8f5e9; color: #2e7d32; }
  .event-meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-value { font-size: 14px; font-weight: 500; }
  .status-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .status-btn {
    padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); cursor: pointer;
    font-size: 12px; font-weight: 600; background: transparent; transition: all 0.12s;
  }
  .status-btn.active-orcando { background: #fff3cd; border-color: #ffc107; color: #856404; }
  .status-btn.active-orcado { background: #d1ecf1; border-color: #17a2b8; color: #0c5460; }
  .status-btn.active-contrato { background: #d4edda; border-color: #28a745; color: #155724; }

  /* FINANCIAL SUMMARY */
  .fin-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px;
  }
  .fin-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
  }
  .fin-card .fin-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fin-card .fin-value { font-size: 20px; font-weight: 700; }
  .fin-card.total .fin-value { color: var(--accent2); }
  .fin-card.pago .fin-value { color: var(--success); }
  .fin-card.saldo .fin-value { color: var(--danger); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; font-size: 13.5px; font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--muted); transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* ITEMS TABLE */
  .cat-section { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .cat-header {
    background: var(--cat-bg); padding: 10px 16px; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    user-select: none;
  }
  .cat-header:hover { background: #e8e1d0; }
  .cat-header .cat-title { display: flex; align-items: center; gap: 8px; }
  .cat-header .cat-total { font-size: 12.5px; color: var(--accent2); font-weight: 600; }
  .cat-arrow { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .cat-collapsed .cat-arrow { transform: rotate(-90deg); }
  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th {
    background: #faf8f3; padding: 8px 10px; font-size: 11px; font-weight: 600;
    text-align: left; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .items-table td {
    padding: 7px 10px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle;
  }
  .items-table tr:last-child td { border-bottom: none; }
  .items-table tr:nth-child(even) td { background: var(--row-alt); }
  .items-table tr:hover td { background: #fdf8ee; }
  .item-name-cell { min-width: 160px; max-width: 220px; }
  .item-status-select {
    padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 11.5px; background: #fff; cursor: pointer; min-width: 80px;
  }
  .item-status-select.st-pendente { color: #888; }
  .item-status-select.st-orcando { background: #fff9e6; color: #856404; border-color: #ffc107; }
  .item-status-select.st-orcado { background: #e6f7ff; color: #0c5460; border-color: #17a2b8; }
  .item-status-select.st-fechado { background: #e9f7ef; color: #155724; border-color: #28a745; }
  .item-status-select.st-pago { background: #d4edda; color: #155724; border-color: #5cb85c; }
  .money-input {
    border: none; background: transparent; font-size: 13px; color: var(--text);
    width: 110px; text-align: right; padding: 2px 4px;
  }
  .money-input:focus { outline: 1px solid var(--accent); border-radius: 3px; background: #fff; }
  .saldo-cell { font-weight: 600; text-align: right; }
  .saldo-pos { color: var(--danger); }
  .saldo-zero { color: var(--muted); }
  .parc-input {
    border: none; background: transparent; font-size: 12px; color: var(--muted);
    width: 100%; padding: 2px 4px; min-width: 120px;
  }
  .parc-input:focus { outline: 1px solid var(--accent); border-radius: 3px; background: #fff; }
  .prev-input {
    border: none; background: transparent; font-size: 12px; color: #16a34a;
    width: 100%; padding: 2px 4px; min-width: 90px; text-align: right;
  }
  .prev-input:focus { outline: 1px solid #16a34a; border-radius: 3px; background: #fff; }
  .fin-card.prev { border-top: 3px solid #16a34a; }
  .fin-card.prev .fin-value { color: #16a34a; }

  /* ANEXOS */
  .anexo-btn { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; cursor: pointer; font-size: 11px; color: var(--muted); vertical-align: middle; }
  .anexo-btn:hover { background: var(--surface-alt); }
  .anexo-btn.has-files { color: #2563eb; border-color: #2563eb; font-weight: 600; }
  .anexo-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; background: var(--surface-alt); }
  .anexo-size { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* SELEÇÃO DE ITENS */
  .sel-toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #ede9fe; border-radius: 6px; margin: 6px 0; font-size: 13px; color: #5b21b6; }
  .sel-row { background: #f5f3ff; }

  /* PACOTES */
  .pacote-row td { background: #f0fdf4; font-weight: 600; }
  .pacote-row .item-name-cell { color: #15803d; }
  .pacote-expand-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--muted); margin-right: 4px; padding: 0; }
  .pacote-sub-row td { background: #fafdf9; padding-top: 3px; padding-bottom: 3px; }
  .dissolve-btn { background: none; border: 1px solid var(--muted); border-radius: 4px; padding: 1px 5px; font-size: 10px; color: var(--muted); cursor: pointer; vertical-align: middle; margin-left: 2px; }
  .dissolve-btn:hover { border-color: var(--danger); color: var(--danger); background: #fee2e2; }
  .obs-input {
    border: none; background: transparent; font-size: 12px; color: var(--muted);
    width: 100%; padding: 2px 4px; min-width: 140px;
  }
  .obs-input:focus { outline: 1px solid var(--accent); border-radius: 3px; background: #fff; }
  .del-btn {
    background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 2px 4px; border-radius: 3px;
    transition: color 0.1s;
  }
  .del-btn:hover { color: var(--danger); background: #fde; }
  .add-item-row { padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .add-item-row input {
    border: 1px dashed var(--border); background: transparent; padding: 6px 12px;
    border-radius: 6px; font-size: 13px; color: var(--muted); width: 280px; transition: all 0.15s;
  }
  .add-item-row input:focus { outline: none; border-color: var(--accent); color: var(--text); background: #fff; width: 340px; }
  .add-item-row .add-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; display: none; white-space: nowrap;
  }
  .add-item-row input:focus ~ .add-btn { display: block; }

  /* CHECKLIST */
  .checklist-etapa { margin-bottom: 20px; }
  .etapa-title {
    font-size: 13.5px; font-weight: 600; color: var(--text); padding: 10px 14px;
    background: var(--cat-bg); border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none;
  }
  .checklist-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }
  .checklist-table td { padding: 9px 14px; font-size: 13px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
  .checklist-table tr:last-child td { border-bottom: none; }
  .checklist-table tr.done td { opacity: 0.55; text-decoration: line-through; }
  .checklist-table tr.done td:first-child, .checklist-table tr.done td:last-child { text-decoration: none; opacity: 1; }
  .check-cb { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .check-item { font-weight: 500; }
  .check-acao { color: var(--muted); font-size: 12px; }
  .check-obs-input {
    border: none; background: transparent; font-size: 12px; color: var(--muted); width: 100%; padding: 1px 4px;
  }
  .check-obs-input:focus { outline: 1px solid var(--accent); border-radius: 3px; background: #fff; }
  .checklist-progress { font-size: 12px; color: var(--muted); margin-left: 10px; }
  .progress-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin-top: 8px; }
  .progress-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .atrasado-section { background: #fff5f5; border: 1.5px solid #f5c6c6; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
  .atrasado-section-title { font-size: 14px; font-weight: 700; color: var(--danger); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .atrasado-count { background: var(--danger); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .atrasado-list { display: flex; flex-direction: column; gap: 6px; }
  .atrasado-item { display: flex; align-items: flex-start; gap: 10px; background: #fff; border: 1px solid #f5c6c6; border-radius: 6px; padding: 8px 12px; }
  .atrasado-item-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .atrasado-item-text { flex: 1; }
  .atrasado-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .atrasado-item-etapa { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .atrasado-item-cb { flex-shrink: 0; accent-color: var(--danger); }
  tr.row-atrasado td { background: #fff8f8 !important; }
  tr.row-atrasado .check-item { color: var(--danger); }
  .atrasado-tag { font-size: 10px; font-weight: 700; color: var(--danger); background: #ffe0e0; border: 1px solid #f5c6c6; border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
  .urgente-tag { font-size: 10px; font-weight: 700; color: var(--warning); background: #fff8e0; border: 1px solid #ffd966; border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
  .global-progress-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px; margin-bottom: 20px; }
  .global-progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
  .global-progress-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .global-progress-pct { font-size: 32px; font-weight: 800; line-height: 1; }
  .global-progress-track { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
  .global-progress-fill { height: 12px; border-radius: 6px; transition: width 0.5s ease; }
  .global-progress-detail { font-size: 12px; color: var(--muted); }
  .global-progress-phases { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

  .etapa-progress-fill { height: 3px; background: var(--accent); transition: width 0.3s; }

  /* LOCAIS */
  .local-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; }
  .local-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .local-card-nome { font-size: 15px; font-weight: 600; }
  .local-card-obs { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .fusao-box-title { font-size: 12px; font-weight: 600; color: var(--accent2); margin-bottom: 6px; }
  .fusao-tags { display: flex; flex-wrap: wrap; gap: 5px; }

function applyLocalProfile(categorias, localNome) {
  if (!localNome) return categorias;
  const perfil = locais.find(l => l.nome.toLowerCase().trim() === localNome.toLowerCase().trim());
  if (!perfil) return categorias;

  let cats = categorias.map(c => ({ ...c, items: c.items.map(i => ({ ...i })) }));
  perfil.fusoes.forEach(fusao => {
    // Recolhe todos os itens das categorias afetadas que estão na lista de fundidos
    const itensFundidos = [];
    cats.forEach(cat => {
      if (fusao.cats.includes(cat.cat)) {
        cat.items = cat.items.filter(it => {
          if (fusao.itensFundidos.includes(it.nome)) { itensFundidos.push(it); return false; }
          return true;
        });
      }
    });

    // Cria/atualiza categoria de destino com o item novo
    let catDest = cats.find(c => c.cat === fusao.catNova);
    if (!catDest) {
      // Insere no lugar da primeira categoria afetada
      const idx = cats.findIndex(c => fusao.cats.includes(c.cat));
      catDest = { cat: fusao.catNova, items: [] };
      cats.splice(idx, 0, catDest);
    }
    // Adiciona o item único de pacote no topo (se ainda não existir)
    if (!catDest.items.find(i => i.nome === fusao.itemNovo.nome)) {
      catDest.items.unshift({ ...fusao.itemNovo });
    }
    // Remove categorias que ficaram vazias por causa da fusão
    cats = cats.filter(c => c.items.length > 0);
  });
  return cats;
}

// ==================== GITHUB SYNC ====================
const GH_REPO = 'thiagomadness-stack/Tm-cerimonial';
const GH_FILE = 'data.json';

function getGHToken() { return localStorage.getItem('tm_gh_token') || ''; }

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color || '#888'; }
}

let _syncTimer = null;
async function syncToGitHub(evs) {
  const token = getGHToken();
  if (!token) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    setSyncStatus('🔄 Salvando...', '#c9a84c');
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(evs))));
      const getRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      let sha = '';
      if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
      const body = { message: 'sync', content, ...(sha ? { sha } : {}) };
      const putRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
        body: JSON.stringify(body)
      });
      if (putRes.ok) setSyncStatus('✅ Sincronizado', '#4caf7d');
      else setSyncStatus('❌ Erro ao salvar', '#e05555');
    } catch { setSyncStatus('❌ Sem conexão', '#e05555'); }
  }, 1500);
}

async function loadFromGitHub() {
  const token = getGHToken();
  if (!token) return;
  setSyncStatus('🔄 Carregando...', '#c9a84c');
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/${GH_FILE}?t=${Date.now()}`);
    if (!res.ok) { setSyncStatus('', ''); return; }
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      localStorage.setItem('tm_eventos', JSON.stringify(data));
      events = data;
      setSyncStatus('✅ Atualizado', '#4caf7d');
      renderSidebarEvents();
      showDashboard();
    } else {
      setSyncStatus('✅ Conectado', '#4caf7d');
    }
  } catch { setSyncStatus('❌ Sem conexão', '#e05555'); }
}

  const token = getGHToken();
  document.body.insertAdjacentHTML('beforeend', `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;" id="sync-modal">
    <div style="background:#fff;padding:28px;border-radius:12px;width:400px;max-width:92vw;">

      </div>
    </div>
  </div>`);
}

function saveSyncToken() {
  const token = document.getElementById('gh-token-input').value.trim();
  document.getElementById('sync-modal').remove();
  if (token) {
    localStorage.setItem('tm_gh_token', token);
    toast('🔗 Token salvo! Sincronizando...', 'success');
    // Tenta carregar do GitHub; se não existir, envia os dados locais
    loadFromGitHub().then(() => {
      const status = document.getElementById('sync-status')?.textContent || '';
      if (!status.includes('✅')) syncToGitHub(events);
    });
  } else {
    localStorage.removeItem('tm_gh_token');
    setSyncStatus('', '');
    toast('Sincronização desativada');
  }
}

// ==================== RENDER ====================
function fmtMoney(v) {
  v = parseFloat(v) || 0;
  return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function parseMoney(s) {
  if (!s) return 0;
  s = String(s).replace(/[^\d,.-]/g, '').replace(',', '.');
  return parseFloat(s) || 0;
}
function fmtDate(d) {
  if (!d) return '–';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function exportarDados() {
  const dados = localStorage.getItem('tm_eventos') || '[]';
  const blob = new Blob([dados], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tm_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exportado com sucesso!');
}

function importarDados() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) throw new Error('Formato inválido');
        localStorage.setItem('tm_eventos', JSON.stringify(parsed));
        events = parsed;
        toast('Dados importados! (' + parsed.length + ' eventos)');
        showDashboard();
      } catch(err) {
        toast('Erro ao importar: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

  const rows = [
    ['🗓️ Eventos', events.length],

  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-outline" onclick="exportarDados()" title="Exportar backup">💾 Exportar</button><button class="btn btn-outline" onclick="importarDados()" title="Importar backup">📂 Importar</button><button class="btn btn-primary" onclick="openNewEventModal()">➕ Novo Evento</button><button class="btn" onclick="syncData()" title="Sincronizar com celular" style="background:#16a34a;color:#fff;border:none">☁️ Sincronizar</button>`;
  renderSidebar();

  const content = document.getElementById('content');
  if (events.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div style="font-size:48px;margin-bottom:12px">📋</div>
      <h3>Nenhum evento cadastrado</h3>
      <p>Clique em "Novo Evento" para começar</p>
      <br><button class="btn btn-primary" onclick="openNewEventModal()">➕ Criar primeiro evento</button>
    </div>`;
    return;
  }

  // summary stats
  let totalValor = 0, totalPago = 0;
  events.forEach(ev => { ev.categorias.forEach(cat => { cat.items.forEach(it => { totalValor += it.valor || 0; totalPago += it.pago || 0; }); }); });

  content.innerHTML = `<div class="dashboard-grid" id="dash-grid"></div>`;

  const grid = document.getElementById('dash-grid');
  const sorted = [...events].sort((a, b) => {
    if (!a.data) return 1;
    if (!b.data) return -1;
    return new Date(a.data) - new Date(b.data);
  });
  sorted.forEach(ev => {
    let valor = 0, pago = 0;
    ev.categorias.forEach(cat => { cat.items.forEach(it => { valor += it.valor || 0; pago += it.pago || 0; }); });
    const checkTotal = ev.checklist.length;
    const checkDone = ev.checklist.filter(c => c.ok).length;
    const badgeMap = { orcando: 'badge-orcando', orcado: 'badge-orcado', contrato: 'badge-contrato' };
    const badgeLabel = { orcando: 'Orçando', orcado: 'Orçado', contrato: 'Contrato' };
    const card = document.createElement('div');
    card.className = `event-card tipo-${ev.tipo}`;
    card.innerHTML = `
      <div class="card-status-badge ${badgeMap[ev.status] || 'badge-orcando'}">${badgeLabel[ev.status] || 'Orçando'}</div>
      <div class="card-tipo">${TIPO_ICONS[ev.tipo]} ${TIPOS[ev.tipo]}</div>
      <div class="card-nome">${ev.nome}</div>
      <div class="card-data">📅 ${fmtDate(ev.data)}${ev.localRecepcao ? ' · 📍 ' + ev.localRecepcao : ''}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-label">Convidados</div><div class="stat-value">${ev.numConvidados || '–'}</div></div>
        <div class="stat"><div class="stat-label">Contrato</div><div class="stat-value money">${fmtMoney(valor)}</div></div>
        <div class="stat"><div class="stat-label">Saldo</div><div class="stat-value money">${fmtMoney(valor - pago)}</div></div>
        <div class="stat"><div class="stat-label">Checklist</div><div class="stat-value">${checkDone}/${checkTotal}</div></div>
      </div>`;
    card.onclick = () => showEvent(ev.id);
    grid.appendChild(card);
  });
}

// ---- EVENT DETAIL ----
function showEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  currentEventId = id;
  currentTab = 'organizacao';

  document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
  renderSidebar();

  document.getElementById('topbar-title').textContent = ev.nome;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="showDashboard()">← Dashboard</button>
    <button class="btn btn-outline btn-sm" onclick="editEventModal('${id}')">✏️ Editar</button>
    <button class="btn btn-outline btn-sm" onclick="printEvento('${id}')">🖨️ Imprimir</button>
    <button class="btn btn-danger btn-sm" onclick="confirmDelete('${id}')">🗑️ Excluir</button>
  `;

  renderEventDetail(ev);
}

function renderEventDetail(ev) {
  const content = document.getElementById('content');
  let valor = 0, pago = 0;
  ev.categorias.forEach(cat => { cat.items.forEach(it => { valor += it.valor || 0; pago += it.pago || 0; }); });

  const tipoClass = ev.tipo === 'casamento' ? 'casamento' : ev.tipo === 'anos15' ? 'anos15' : 'formatura';
  const statusMap = { orcando: 'Orçando', orcado: 'Orçado', contrato: 'Contrato' };

  content.innerHTML = `
    <div class="event-header">
      <div class="event-header-top">
        <div class="event-header-info">
          <div class="tipo-tag ${tipoClass}">${TIPO_ICONS[ev.tipo]} ${TIPOS[ev.tipo]}</div>
          <h1>${ev.nome}</h1>
        </div>
      </div>
      <div class="event-meta">
        <div class="meta-item"><div class="meta-label">Data</div><div class="meta-value">📅 ${fmtDate(ev.data)}</div></div>
        <div class="meta-item"><div class="meta-label">Convidados</div><div class="meta-value">👥 ${ev.numConvidados || '–'}</div></div>
        ${ev.localCerimonia ? `<div class="meta-item"><div class="meta-label">Local Cerimônia</div><div class="meta-value">⛪ ${ev.localCerimonia}</div></div>` : ''}
        <div class="meta-item"><div class="meta-label">Local Recepção</div><div class="meta-value">🏛️ ${ev.localRecepcao || '–'}</div></div>
      </div>
      <div class="status-row">
        <span style="font-size:12px;color:var(--muted);margin-right:6px">Status:</span>
        ${['orcando','orcado','contrato'].map(s => `<button class="status-btn ${ev.status===s?'active-'+s:''}" onclick="setStatus('${ev.id}','${s}')">${statusMap[s]}</button>`).join('')}
      </div>
    </div>

    <div class="fin-summary">
      <div class="fin-card prev"><div class="fin-label">Previsão de Orçamento</div><div class="fin-value">${fmtMoney(ev.categorias.reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+(i.prev||0),0),0))}</div></div>
      <div class="fin-card total"><div class="fin-label">Valor Total Contrato</div><div class="fin-value">${fmtMoney(valor)}</div></div>
      <div class="fin-card pago"><div class="fin-label">Total Pago</div><div class="fin-value">${fmtMoney(pago)}</div></div>
      <div class="fin-card saldo"><div class="fin-label">Saldo em Aberto</div><div class="fin-value">${fmtMoney(valor - pago)}</div></div>
      <div class="fin-card"><div class="fin-label">Checklist</div><div class="fin-value">${ev.checklist.filter(c=>c.ok).length}/${ev.checklist.length}</div></div>
    </div>

    <div class="tabs">
      <div class="tab ${currentTab==='organizacao'?'active':''}" onclick="switchTab('organizacao')">📋 Organização Geral</div>
      <div class="tab ${currentTab==='checklist'?'active':''}" onclick="switchTab('checklist')">✅ Checklist</div>
    </div>
    <div id="tab-content"></div>
  `;

  renderTabContent(ev);
}

function switchTab(tab) {
  currentTab = tab;
  const ev = events.find(e => e.id === currentEventId);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab === 'organizacao' ? 0 : 1].classList.add('active');
  renderTabContent(ev);
}

function renderTabContent(ev) {
  try {
    const tc = document.getElementById('tab-content');
    if (currentTab === 'organizacao') renderOrganizacao(ev, tc);
    else renderChecklist(ev, tc);
  } catch(e) {
    toast('Erro ao exibir evento: ' + e.message, 'error');
    console.error(e);
  }
}

    html += `<div class="cat-section ${collapsed ? 'cat-collapsed' : ''}" id="cat-${catKey}">

function renderChecklist(ev, container) {
  const total = ev.checklist.length;
  const done = ev.checklist.filter(c => c.ok).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const progressColor = pct < 30 ? 'var(--danger)' : pct < 70 ? 'var(--warning)' : 'var(--success)';
  const mesesRestantes = getMesesAteEvento(ev.data);

  const etapas = {};
  ev.checklist.forEach((c, i) => {
    if (!etapas[c.etapa]) etapas[c.etapa] = [];
    etapas[c.etapa].push({ ...c, _i: i });
  });

  // Collect atrasados
  const atrasados = ev.checklist.map((c, i) => ({...c, _i: i}))
    .filter(c => getItemStatus(c.etapa, c.ok, mesesRestantes, c.prazo) === 'atrasado');
  const urgentes = ev.checklist.map((c, i) => ({...c, _i: i}))
    .filter(c => getItemStatus(c.etapa, c.ok, mesesRestantes, c.prazo) === 'urgente');

  // Phase summary chips
  const phaseChips = Object.entries(etapas).map(([etapa, items]) => {
    const d = items.filter(i => i.ok).length;
    const isDone = d === items.length;
    const hasAtrasado = items.some(i => getItemStatus(etapa, i.ok, mesesRestantes, i.prazo) === 'atrasado');
    const attr = isDone ? 'class="phase-chip done"' : hasAtrasado ? `class="phase-chip" style="background:#ffe0e0;border-color:#f5c6c6;color:var(--danger)"` : 'class="phase-chip"';
    return `<span ${attr} title="${d}/${items.length} concluídos">${etapa.replace('📅 ', '')}: ${d}/${items.length}</span>`;
  }).join('');

  let html = '';

  // Atrasados section
  if (atrasados.length > 0) {
    html += `<div class="atrasado-section">
      <div class="atrasado-section-title">
        ⚠️ Itens Atrasados
        <span class="atrasado-count">${atrasados.length}</span>
        <span style="font-size:11px;font-weight:400;color:var(--danger)">— o prazo já passou e ainda não foram concluídos</span>
      </div>
      <div class="atrasado-list">`;
    atrasados.forEach(c => {
      html += `<div class="atrasado-item">
        <input type="checkbox" class="atrasado-item-cb check-cb" ${c.ok?'checked':''} onchange="toggleCheck('${ev.id}',${c._i},this.checked)">
        <div class="atrasado-item-text">
          <div class="atrasado-item-name">${c.item}</div>
          <div class="atrasado-item-etapa">${c.etapa.replace('📅 ','')} · ${c.acao}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Urgentes section (apenas se tem data)
  if (urgentes.length > 0 && mesesRestantes !== null) {
    html += `<div style="background:#fffbf0;border:1.5px solid #ffd966;border-radius:10px;padding:14px 18px;margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;color:var(--warning);margin-bottom:10px;display:flex;align-items:center;gap:8px;">
        🔔 Atenção – Prazo chegando
        <span style="background:var(--warning);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px">${urgentes.length}</span>
        <span style="font-size:11px;font-weight:400;color:#a07800">— contrate agora para não atrasar</span>
      </div>
      <div class="atrasado-list">`;
    urgentes.forEach(c => {
      html += `<div class="atrasado-item" style="border-color:#ffd966">
        <input type="checkbox" class="check-cb" ${c.ok?'checked':''} onchange="toggleCheck('${ev.id}',${c._i},this.checked)">
        <div class="atrasado-item-text">
          <div class="atrasado-item-name">${c.item}</div>
          <div class="atrasado-item-etapa">${c.etapa.replace('📅 ','')} · ${c.acao}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Global progress box
  const mesesLabel = mesesRestantes !== null
    ? `<span style="font-size:12px;color:var(--muted);margin-left:10px">📅 ${Math.round(mesesRestantes * 10) / 10} meses até o evento</span>`
    : '';
  html += `
    <div class="global-progress-box">
      <div class="global-progress-header">
        <div>
          <div class="global-progress-title">Progresso Geral do Checklist ${mesesLabel}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${done} de ${total} itens concluídos</div>
        </div>
        <div class="global-progress-pct" style="color:${progressColor}">${pct}%</div>
      </div>
      <div class="global-progress-track">
        <div class="global-progress-fill" id="global-pb" style="width:${pct}%;background:${progressColor}"></div>
      </div>
      <div class="global-progress-phases">${phaseChips}</div>
    </div>`;

  for (const [etapa, items] of Object.entries(etapas)) {
    const etKey = ev.id + '_etapa_' + etapa.replace(/[^a-z0-9]/gi,'_');
    const collapsed = collapsedEtapas[etKey];
    const etDone = items.filter(i => i.ok).length;
    const etPct = Math.round(etDone / items.length * 100);
    const etAtrasados = items.filter(i => getItemStatus(etapa, i.ok, mesesRestantes, i.prazo) === 'atrasado').length;
    const etColor = etAtrasados > 0 ? 'var(--danger)' : etPct === 100 ? 'var(--success)' : etPct < 70 ? 'var(--warning)' : 'var(--success)';
    const atrasadoTag = etAtrasados > 0 ? `<span style="font-size:10px;background:var(--danger);color:#fff;border-radius:8px;padding:1px 7px;font-weight:700;margin-left:6px">${etAtrasados} atrasado${etAtrasados>1?'s':''}</span>` : '';

    html += `<div class="cat-section ${collapsed ? 'cat-collapsed' : ''}">
      <div class="cat-header" onclick="toggleEtapa('${etKey}')">
        <div class="cat-title">${etapa}${atrasadoTag} <span style="font-size:11px;color:var(--muted);font-weight:400">(${items.length} itens)</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--muted)">${etDone}/${items.length}</span>
          <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:${etColor}22;color:${etColor};border:1px solid ${etColor}55">${etPct}%</span>
          <span class="cat-arrow">▼</span>
        </div>
      </div>`;

    if (!collapsed) {
      html += `<div class="etapa-progress-bar-wrap" style="border-radius:0;margin:0"><div class="etapa-progress-fill" style="width:${etPct}%;background:${etColor}"></div></div>
      <table class="checklist-table"><tbody>`;
      items.forEach(c => {
        const st = getItemStatus(etapa, c.ok, mesesRestantes, c.prazo);
        const rowClass = c.ok ? 'done' : st === 'atrasado' ? 'row-atrasado' : '';
        const tag = !c.ok && st === 'atrasado' ? '<span class="atrasado-tag">ATRASADO</span>'
                  : !c.ok && st === 'urgente'   ? '<span class="urgente-tag">URGENTE</span>' : '';
        const prazoSug = calcPrazoSugerido(ev.data, etapa);
        const prazoVal = c.prazo || '';
        const prazoExibir = prazoVal || prazoSug;
        const prazoAtrasado = !c.ok && prazoExibir && new Date(prazoExibir) < new Date();
        const prazoColor = c.ok ? '' : prazoAtrasado ? 'color:var(--danger);font-weight:600' : prazoExibir ? 'color:var(--warning)' : 'color:var(--muted)';
        html += `<tr class="${rowClass}">
          <td style="width:34px;text-align:center"><input type="checkbox" class="check-cb" ${c.ok?'checked':''} onchange="toggleCheck('${ev.id}',${c._i},this.checked)"></td>
          <td class="check-item" style="width:180px">${c.item}${tag}</td>
          <td style="width:120px;text-align:center">
            <input type="date" value="${prazoVal}" placeholder="${prazoSug}"
              style="border:none;background:transparent;font-size:12px;${prazoColor};cursor:pointer;width:110px"
              title="Data limite${prazoVal?'':' (sugerida: '+fmtPrazo(prazoSug)+')'}"
              onchange="updateCheck('${ev.id}',${c._i},'prazo',this.value)">
          </td>
          <td class="check-acao"><input class="check-obs-input" value="${(c.acao||'').replace(/"/g,'&quot;')}" placeholder="Ação..." onchange="updateCheck('${ev.id}',${c._i},'acao',this.value)"></td>
          <td style="width:200px"><input class="check-obs-input" value="${(c.obs||'').replace(/"/g,'&quot;')}" placeholder="Observação..." onchange="updateCheck('${ev.id}',${c._i},'obs',this.value)"></td>
          <td style="width:30px;text-align:center"><button onclick="deleteChecklistItem('${ev.id}',${c._i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 4px" title="Remover item">✕</button></td>
        </tr>`;
      });
      html += `</tbody></table>
      <div class="add-item-row" style="padding:6px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        <input id="cl-inp-${ev.id}-${etapa.replace(/[^a-z0-9]/gi,'_')}" placeholder="Novo item do checklist..." style="flex:1;min-width:140px;font-size:13px">
        <input id="cl-acao-${ev.id}-${etapa.replace(/[^a-z0-9]/gi,'_')}" placeholder="Ação..." style="flex:1;min-width:140px;font-size:13px">
        <button class="add-btn" onclick="addChecklistItem('${ev.id}','${etapa.replace(/'/g,"\\'")}','cl-inp-${ev.id}-${etapa.replace(/[^a-z0-9]/gi,'_')}','cl-acao-${ev.id}-${etapa.replace(/[^a-z0-9]/gi,'_')}')" style="font-size:12px;padding:5px 12px;white-space:nowrap;display:block">➕ Adicionar</button>
      </div>`;
    }
    html += `</div>`;
  }
  html += `<div style="padding:10px 14px 4px">
    <button onclick="addChecklistEtapa('${ev.id}')" style="background:none;border:1px dashed var(--border);border-radius:6px;padding:6px 16px;font-size:13px;color:var(--muted);cursor:pointer">➕ Nova etapa</button>
  </div>`;
  container.innerHTML = html;
}

// ==================== PRAZO HELPERS ====================
// Prazos mínimos (meses antes do evento) para cada etapa padrão
// Se restarem menos que "min" meses e o item não estiver feito → ATRASADO
// Se restarem entre "min" e "max" → URGENTE
const ETAPA_PRAZOS = {
  '⚙️ Geral':                           { min: 12, max: 18 },
  '🏛️ Local da Recepção e Festa':        { min: 12, max: 18 },
  '⛪ Local da Celebração':              { min: 12, max: 18 },
  '📸 Fotografia e Filmagem':            { min: 9,  max: 15 },
  '🍽️ Gastronomia':                      { min: 6,  max: 12 },
  '📄 Papelaria':                        { min: 4,  max: 9  },
  '🌸 Decoração':                        { min: 6,  max: 12 },
  '🔊 Sonorização, Iluminação e Telões': { min: 6,  max: 12 },
  '🎵 Atrações Musicais':                { min: 6,  max: 12 },
  '🍷 Bebidas':                          { min: 2,  max: 5  },
  '💄 Para a Noiva':                     { min: 6,  max: 10 },
  '🤵 Para o Noivo':                     { min: 3,  max: 6  },
  '💍 Para os Noivos':                   { min: 3,  max: 6  },
  '✨ Extras':                           { min: 1,  max: 3  },
};

function getEtapaMaxMeses(etapa) {
  if (ETAPA_PRAZOS[etapa]) return ETAPA_PRAZOS[etapa].max;
  const m = etapa.match(/(\d+)[–-](\d+)\s+meses/);
  if (m) return parseInt(m[2]);
  const s = etapa.match(/(\d+)[–-](\d+)\s+semanas/);
  if (s) return parseInt(s[2]) / 4.33;
  return 0;
}
function getEtapaMinMeses(etapa) {
  if (ETAPA_PRAZOS[etapa]) return ETAPA_PRAZOS[etapa].min;
  const m = etapa.match(/(\d+)[–-](\d+)\s+meses/);
  if (m) return parseInt(m[1]);
  const s = etapa.match(/(\d+)[–-](\d+)\s+semanas/);
  if (s) return parseInt(s[1]) / 4.33;
  return 0;
}
function getMesesAteEvento(dataEvento) {
  if (!dataEvento) return null;
  const diff = new Date(dataEvento) - new Date();
  return diff / (1000 * 60 * 60 * 24 * 30.44);
}
function calcPrazoSugerido(dataEvento, etapa) {
  if (!dataEvento || !ETAPA_PRAZOS[etapa]) return '';
  const d = new Date(dataEvento);
  d.setMonth(d.getMonth() - ETAPA_PRAZOS[etapa].min);
  return d.toISOString().slice(0, 10);
}

function fmtPrazo(prazo) {
  if (!prazo) return '';
  const [y, m, d] = prazo.split('-');
  return `${d}/${m}/${y}`;
}

// 'atrasado' = prazo já passou e item não está feito
// 'urgente'  = prazo está chegando (dentro da janela)
function getItemStatus(etapa, ok, mesesRestantes, prazo) {
  if (ok) return 'ok';
  if (prazo) {
    const diff = new Date(prazo) - new Date();
    const meses = diff / (1000 * 60 * 60 * 24 * 30.44);
    if (meses < 0) return 'atrasado';
    if (meses < 1.5) return 'urgente';
    return 'ok';
  }
  if (mesesRestantes === null) return 'ok';
  const maxM = getEtapaMaxMeses(etapa);
  const minM = getEtapaMinMeses(etapa);
  if (mesesRestantes < minM) return 'atrasado';
  if (mesesRestantes <= maxM) return 'urgente';
  return 'ok';
}

// ==================== ACTIONS ====================
function toggleCat(key) {
  collapsedCats[key] = !collapsedCats[key];
  const ev = events.find(e => e.id === currentEventId);
  renderTabContent(ev);
}

function toggleEtapa(key) {
  collapsedEtapas[key] = !collapsedEtapas[key];
  const ev = events.find(e => e.id === currentEventId);
  renderTabContent(ev);
}

function normStr(s) {
  try {
    return (s || '').toLowerCase().trim().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ');
  } catch(e) { return (s || '').toLowerCase().trim(); }
}
function nomeMatch(a, b) {
  const na = normStr(a), nb = normStr(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  if (na.includes(nb) || nb.includes(na)) return true;
  const pa = na.split(/\s+/)[0], pb = nb.split(/\s+/)[0];
  if (pa.length >= 4 && pa === pb) return true;
  return false;
}

function updateItem(evId, ci, ii, field, val) {
  const ev = events.find(e => e.id === evId);
  ev.categorias[ci].items[ii][field] = val;

  if (field === 'status') {
    const nome = ev.categorias[ci].items[ii].nome;
    const marcar = (val === 'fechado' || val === 'pago');
    (ev.checklist || []).forEach(c => {
      if (nomeMatch(nome, c.item)) c.ok = marcar;
    });
    saveData(events);
    renderTabContent(ev);
  } else {
    saveData(events);
  }
}

function updateMoney(evId, ci, ii, field, val, inputEl) {
  const v = parseMoney(val);
  const ev = events.find(e => e.id === evId);
  ev.categorias[ci].items[ii][field] = v;
  inputEl.value = v || '';

  const it = ev.categorias[ci].items[ii];

  // Auto-status update based on payments
  if (field === 'pago' || field === 'valor') {
    const valor = it.valor || 0;
    const pago  = it.pago  || 0;
    let novoStatus = it.status;
    if (valor > 0 && pago >= valor) {
      novoStatus = 'pago';
    } else if (pago > 0 && pago < valor) {
      novoStatus = 'fechado'; // pagamento parcial → mantém como fechado
    } else if (valor > 0 && it.status === 'pago') {
      novoStatus = 'fechado'; // valor foi editado para maior, volta a fechado
    }
    if (novoStatus !== it.status) {
      it.status = novoStatus;
      const sel = document.getElementById(`status-sel-${evId}-${ci}-${ii}`);
      if (sel) {
        sel.value = novoStatus;
        sel.className = 'item-status-select st-' + novoStatus;
      }
    }
  }

  saveData(events);

  // update saldo cell
  const saldo = (it.valor || 0) - (it.pago || 0);
  const cell = document.getElementById(`saldo-${evId}-${ci}-${ii}`);
  if (cell) {
    cell.textContent = fmtMoney(saldo);
    cell.className = 'saldo-cell ' + (saldo > 0 ? 'saldo-pos' : 'saldo-zero');
  }

  // update previsão total card
  if (field === 'prev') {
    const totalPrev = ev.categorias.reduce((s,c) => s + c.items.reduce((ss,i) => ss + (i.prev||0), 0), 0);
    const cards = document.querySelectorAll('.fin-card');
    if (cards[0]) cards[0].querySelector('.fin-value').textContent = fmtMoney(totalPrev);
  }

  renderSidebar();
}

function addItem(evId, ci, nome) {
  const ev = events.find(e => e.id === evId);
  ev.categorias[ci].items.push({ nome, status: 'pendente', obs: '', valor: 0, pago: 0, parc: '', prev: 0, anexos: [] });
  saveData(events);
  renderTabContent(ev);
  toast('Item adicionado');
}

function toggleSelItem(ii) {

function criarPacoteModal(evId, ci) {
  if (!_selMode || _selMode.selected.size < 1) return;
  const ev = events.find(e => e.id === evId);
  const itensIdx = [..._selMode.selected];
  const nomes = itensIdx.map(ii => '• ' + ev.categorias[ci].items[ii]?.nome).join('<br>');
  const html = `<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h2>📦 Agrupar em Pacote</h2><button class="btn btn-outline btn-sm" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7">${nomes}</p>
        <div class="form-group"><label>Nome do Fornecedor / Pacote *</label>
          <input id="pac-nome" placeholder="ex: Studio Fotográfico XYZ" /></div>
        <div class="form-row">
          <div class="form-group"><label>Valor do Contrato (R$)</label>
            <input id="pac-valor" type="number" placeholder="0,00" step="0.01" /></div>
          <div class="form-group"><label>Valor Pago (R$)</label>

        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarCriarPacote('${evId}',${ci},[${itensIdx.join(',')}])">Criar Pacote</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function confirmarCriarPacote(evId, ci, itensIdx) {
  const nome = document.getElementById('pac-nome').value.trim();
  if (!nome) { toast('Informe o nome do fornecedor', 'error'); return; }
  const ev = events.find(e => e.id === evId);
  const cat = ev.categorias[ci];
  if (!cat.pacotes) cat.pacotes = [];
  const valor = parseFloat(document.getElementById('pac-valor').value) || 0;
  const pago  = parseFloat(document.getElementById('pac-pago').value)  || 0;
  const parc  = document.getElementById('pac-parc').value;
  const pid   = genId();
  const status = valor > 0 && pago >= valor ? 'pago' : pago > 0 ? 'fechado' : 'pendente';
  cat.pacotes.push({ id: pid, nome, status, valor, pago, parc, obs: '', prev: 0, itensIdx: [...itensIdx], anexos: [], expanded: true });
  itensIdx.forEach(ii => { cat.items[ii].pacoteId = pid; });
  saveData(events);
  _selMode = null;
  closeModal();
  renderTabContent(ev);
  toast('Pacote criado!', 'success');
}

function togglePacote(evId, ci, pid) {
  const ev = events.find(e => e.id === evId);
  const pac = (ev.categorias[ci].pacotes || []).find(p => p.id === pid);
  if (pac) { pac.expanded = pac.expanded === false ? true : false; saveData(events); renderTabContent(ev); }
}

function syncPacoteChecklist(ev, ci, pid, marcar) {
  const cat = ev.categorias[ci];
  const itensDoPacote = cat.items.filter(it => it.pacoteId === pid);
  (ev.checklist || []).forEach(c => {
    itensDoPacote.forEach(it => {
      if (nomeMatch(it.nome, c.item)) c.ok = marcar;
    });
  });
}

function updatePacote(evId, ci, pid, field, val) {
  const ev = events.find(e => e.id === evId);
  const pac = (ev.categorias[ci].pacotes || []).find(p => p.id === pid);
  if (!pac) return;
  if (field === 'valor' || field === 'pago' || field === 'prev') {
    pac[field] = parseMoney(val);
    if (field !== 'prev') {
      const sp = (pac.valor||0) - (pac.pago||0);
      const cell = document.getElementById(`pac-saldo-${evId}-${ci}-${pid}`);
      if (cell) { cell.textContent = fmtMoney(sp); cell.className = 'saldo-cell ' + (sp > 0 ? 'saldo-pos' : 'saldo-zero'); }
      if (pac.valor > 0 && pac.pago >= pac.valor) pac.status = 'pago';
      else if (pac.pago > 0) pac.status = 'fechado';
      const sel = document.getElementById(`pac-status-${evId}-${ci}-${pid}`);
      if (sel) { sel.value = pac.status; sel.className = 'item-status-select st-' + pac.status; }
    }
  } else {
    pac[field] = val;
  }
  if (field === 'status') {
    const marcar = (val === 'fechado' || val === 'pago');
    syncPacoteChecklist(ev, ci, pid, marcar);
  }
  saveData(events);
}

function ativarAddMode(evId, ci, pid) {
  _addMode = { evId, ci, pid, selected: new Set() };
  const ev = events.find(e => e.id === evId);
  renderTabContent(ev);
}

function cancelarAddMode() {
  const evId = _addMode?.evId;
  _addMode = null;
  const ev = events.find(e => e.id === evId);
  if (ev) renderTabContent(ev);
}

function toggleAddItem(ii) {
  if (!_addMode) return;
  if (_addMode.selected.has(ii)) _addMode.selected.delete(ii);
  else _addMode.selected.add(ii);
  const n = _addMode.selected.size;
  const lbl = document.getElementById(`add-lbl-${_addMode.evId}-${_addMode.ci}`);
  if (lbl) lbl.textContent = n > 0 ? n + ' selecionado(s)' : '';
  const btn = document.getElementById(`add-btn-${_addMode.evId}-${_addMode.ci}`);
  if (btn) btn.style.display = n > 0 ? '' : 'none';
}

function confirmarAddAoPacote(evId, ci) {
  if (!_addMode || _addMode.selected.size === 0) return;
  const ev = events.find(e => e.id === evId);
  const cat = ev.categorias[ci];
  const pac = (cat.pacotes||[]).find(p => p.id === _addMode.pid);
  if (!pac) return;
  _addMode.selected.forEach(ii => {
    if (!pac.itensIdx.includes(ii)) pac.itensIdx.push(ii);
    cat.items[ii].pacoteId = pac.id;
  });
  saveData(events);
  _addMode = null;
  renderTabContent(ev);
  toast('Item(ns) adicionado(s) ao pacote!', 'success');
}

function dissolverPacote(evId, ci, pid) {
  const ev = events.find(e => e.id === evId);
  const cat = ev.categorias[ci];
  const pac = (cat.pacotes||[]).find(p => p.id === pid);
  if (!pac) return;
  openConfirm(`Desfazer pacote "${pac.nome}"?`, 'Os itens voltarão a ser independentes. Os valores do pacote serão removidos.', () => {
    cat.items.forEach(it => { if (it.pacoteId === pid) delete it.pacoteId; });
    cat.pacotes = cat.pacotes.filter(p => p.id !== pid);
    saveData(events);
    closeModal();
    renderTabContent(ev);
    toast('Pacote desfeito');
  });
}

// ---- ANEXOS ----
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return Math.round(bytes / 1024) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function openAnexos(evId, ci, ii, pid) {
  const ev = events.find(e => e.id === evId);
  const item = pid ? (ev.categorias[ci].pacotes||[]).find(p => p.id === pid) : ev.categorias[ci].items[ii];

  const listaHtml = anexos.length === 0
    ? '<p style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">Nenhum arquivo anexado ainda.</p>'

      <div class="anexo-item">

        <a href="${a.dados}" download="${a.nome}" target="_blank" style="flex:1;font-size:13px;color:var(--accent);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.nome}">${a.nome}</a>
        <span class="anexo-size">${formatSize(a.tamanho)}</span>
        <button class="del-btn" onclick="removeAnexo('${evId}',${ci},${ii},'${pid||''}',${idx})">✕</button>
      </div>`).join('');

  const html = `<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">

function handleAnexoFiles(event, evId, ci, ii, pid) {
  const files = Array.from(event.target.files);
  const MAX = 5 * 1024 * 1024;
  let count = 0;
  files.forEach(file => {
    if (file.size > MAX) { toast(`"${file.name}" excede 5MB`, 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const ev = events.find(ev2 => ev2.id === evId);
      const item = pid ? (ev.categorias[ci].pacotes||[]).find(p => p.id === pid) : ev.categorias[ci].items[ii];
      if (!item) return;
      if (!item.anexos) item.anexos = [];
      item.anexos.push({ nome: file.name, tipo: file.type, dados: e.target.result, tamanho: file.size });
      saveData(events);
      count++;
      if (count === files.length) {
        toast(count + ' arquivo(s) anexado(s)!', 'success');
        openAnexos(evId, ci, ii, pid || null);
      }
    };
    reader.readAsDataURL(file);
  });
}

function removeAnexo(evId, ci, ii, pid, idx) {
  const ev = events.find(e => e.id === evId);
  const item = pid ? (ev.categorias[ci].pacotes||[]).find(p => p.id === pid) : ev.categorias[ci].items[ii];
  if (!item || !item.anexos) return;
  item.anexos.splice(idx, 1);
  saveData(events);
  openAnexos(evId, ci, ii, pid || null);
  toast('Arquivo removido');
}

function criarEvento() {
  try {
    const nome = document.getElementById('ev-nome').value.trim();
    if (!nome) { toast('Informe o nome do evento', 'error'); return; }
    const tipo = window._selectedTipo || 'casamento';
    const localCerEl = document.getElementById('ev-localCerimonia');
    const ev = {
      id: genId(),
      tipo: tipo,
      nome: nome,
      data: document.getElementById('ev-data').value || '',
      numConvidados: parseInt(document.getElementById('ev-convidados').value) || 0,
      localCerimonia: localCerEl ? localCerEl.value : '',
      localRecepcao: document.getElementById('ev-localRecepcao').value || '',
      status: document.getElementById('ev-status').value || 'orcando',
      categorias: [],
      checklist: [],
    };
    const tmplCats = getTemplateItems(tipo);
    let categorias = tmplCats.map(function(c) {
      return { cat: c.cat, items: c.items.map(function(i) { return Object.assign({}, i); }) };
    });
    ev.categorias = applyLocalProfile(categorias, ev.localRecepcao);
    const tmplCheck = getChecklistTemplate(tipo);
    ev.checklist = tmplCheck.map(function(c) { return Object.assign({}, c); });
    events.push(ev);
    saveData(events);
    closeModal();
    toast('Evento criado com sucesso!', 'success');
    showEvent(ev.id);
  } catch(e) {
    toast('Erro ao criar evento: ' + e.message, 'error');
    console.error(e);
  }
}
